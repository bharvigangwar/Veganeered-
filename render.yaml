services:
  - type: web
    name: veganeered
    env: node
    buildCommand: npm install
    startCommand: node BACKEND/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: 3000