<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Veganeered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- ── NAVBAR ── -->
    <nav>
    <div class="logo">Veganeered</div>
    <div class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/index.html#about">About Me</a>
        <a href="/recipes.html">Explore Now</a>
    </div>
</nav>

    <!-- =============================================
         LOGIN FORM
         Admin enters username + password here
         On success → redirected to dashboard.html
         On failure → error message shown below form
         ============================================= -->
    <section class="login-section">

        <div class="login-card">

            <!-- Heading -->
            <h1 class="login-title">Admin Login</h1>
            <p class="login-sub">Enter your credentials to manage recipes.</p>

            <!-- Error message box — hidden by default, shown on wrong credentials -->
            <!-- JS toggles the 'hidden' class to show/hide this -->
            <div class="login-error hidden" id="login-error">
                Invalid username or password.
            </div>

            <!-- Login form -->
            <!-- We use divs instead of a form tag to control submission ourselves -->
            <div class="login-form">

                <!-- Username field -->
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input
                        class="form-input"
                        type="text"
                        id="username"
                        placeholder="Enter username"
                    >
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        class="form-input"
                        type="password"
                        id="password"
                        placeholder="Enter password"
                    >
                </div>

                <!-- Submit button -->
                <button class="login-btn" id="login-btn" onclick="handleLogin()">
                    Login
                </button>

            </div>

        </div>

    </section>

    <footer>
    <div class="footer-logo">Veganeered</div>
    <div class="footer-links">
        <a href="/index.html">Home</a>
        <a href="/recipes.html?category=vegan">Vegan</a>
        <a href="/recipes.html?category=vegetarian">Vegetarian</a>
        <a href="/index.html#about">About Me</a>
    </div>
    <div class="footer-contact">
        <p>hello@veganeered.com</p>
        <p>123-456-7890</p>
    </div>
</footer>

    <script src="/js/admin.js"></script>
</body>
</html>
